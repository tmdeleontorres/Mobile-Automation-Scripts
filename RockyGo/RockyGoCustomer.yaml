appId: com.trackerteer.grg.dev
---
- launchApp:
    clearState: true

# Check get started permission 
- assertVisible:
    text: "Use current location"
- tapOn: "Use current location"
- assertVisible:
    text: "Get Started"
- tapOn: "Get Started"

# Wait for the animation to end before asserting the visibility of the elements
- waitForAnimationToEnd:
    timeout: 5000

# Assert the visibility of the elements on the dashboard
- assertVisible:
    id: "text_view_promotion"
- assertVisible:
    id: "text_view_food_type"
- assertVisible:
    id: "text_view_offers"
- assertVisible:
    id: "text_view_restaurant"
- assertVisible:
    id: "image_account_menu"

# Redirect to login page
- tapOn:
    id: "image_account_menu"

# Check login fields
- assertVisible:
    id: "edittext_username"
- tapOn: "Email"
- inputText: "sample.trackerteer+2@gmail.com"
- assertVisible:
    id: "edittext_password"
- tapOn: "Password"
- inputText: "Test1234!"
